<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gran Tour pel Barroc — Portfoli de 3r ESO</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E8C97A;
  --gold-pale: #F5EDD6;

  /* 🔧 MÁS OSCURO Y LEGIBLE */
  --ink: #0E0703;
  --ink-mid: #1E120A;
  --ink-soft: #2F1C10;

  --parchment: #F8F2E4;
  --parchment-dark: #EDE4CC;
  --cream: #FDFAF3;

  --red-dark: #6A1616;
  --blue-dark: #101E33;
  --blue-mid: #203857;

  --shadow: rgba(0,0,0,0.25);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'Crimson Pro', Georgia, serif;
  font-size: 18px;
  line-height: 1.75;
  overflow-x: hidden;
}

/* Noise */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.25;
}

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(10,6,3,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(201,168,76,0.25);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 58px;
}

.nav-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.nav-links a {
  color: rgba(232,201,122,0.9);
}

/* HERO */
.hero {
  min-height: 100vh;
  background: linear-gradient(160deg, #0B0F18 0%, #120B05 55%, #1C0F06 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 6rem 2rem 4rem;
}

.hero-title {
  color: #F3E9D6;
}

.hero-sub {
  color: rgba(243,233,214,0.75);
}

/* TEXTOS MÁS OSCUROS GLOBAL */
.section-intro {
  color: var(--ink-mid);
}

p, li {
  color: var(--ink-mid);
}

.glossari-def,
.dest-desc,
.master-desc {
  color: var(--ink-mid);
}

.timeline-event {
  color: var(--ink-mid);
}

</style>
</head>

<body>

</body>
</html>
